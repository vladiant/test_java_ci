name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    name: Build & Test (Java ${{ matrix.java-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        java-version: [ 21, 23 ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build, test and verify
        run: ./gradlew check assemble

      - name: Upload coverage report to Codecov
        # Only upload once (from the primary Java version)
        if: matrix.java-version == 21
        uses: codecov/codecov-action@v4
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload JaCoCo HTML report as artifact
        if: matrix.java-version == 21
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

      - name: Upload test results
        if: always() && matrix.java-version == 21
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results/test/
          retention-days: 7

      - name: Publish test results
        if: always() && matrix.java-version == 21
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: build/test-results/test/*.xml
          check_name: Test Results

      - name: Upload application JAR
        if: matrix.java-version == 21
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: build/libs/java-ci-example-*.jar
          retention-days: 7
